name: CI/CD Security Pipeline (Custom Build)

on: [push, pull_request]

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. On construit l'image à partir du Dockerfile de TON repo
      - name: Build local image
        run: docker build -t my-juice-shop .

      # 2. On lance TON image (celle qui contient tes modifs)
      - name: Launch local Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 my-juice-shop
          sleep 30 # Juice Shop est lourd, on lui laisse du temps

      # 3. ZAP attaque l'instance locale que l'on vient de builder
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
