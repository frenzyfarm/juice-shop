name: CI/CD Security Pipeline (Juice Shop - Fixed)

on:
  push:
  pull_request:

jobs:

  # 1. SAST - Analyse statique
  sast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -r . -f html -o bandit-report.html
        continue-on-error: true

      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_number }}
          path: bandit-report.html


  # 2. Secrets Scan - FULL SCAN
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Full Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true


  # 3. DAST - Version corrigée
  dast-scan:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix permissions for ZAP
        run: chmod -R 777 ${{ github.workspace }}

      - name: Start Juice Shop (Docker)
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          until curl -s http://localhost:3000 > /dev/null; do
            echo "Waiting for Juice Shop..."
            sleep 5
          done

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false

      - name: Debug - list generated files
        if: always()
        run: ls -lah

      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            report_html.html
            report_md.md
            report_json.json

      - name: Stop Juice Shop
        if: always()
        run: docker stop juice-shop
