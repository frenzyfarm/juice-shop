name: CI/CD Security Pipeline (Juice Shop - Fixed)

on:
  push:
  pull_request:

jobs:

  # 1. SAST - Analyse statique
  sast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -r . -f html -o bandit-report.html
        continue-on-error: true

      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_number }}
          path: bandit-report.html


  # 2. Secrets Scan - FULL SCAN avec export des résultats
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Full Scan with JSON output
        run: |
          docker run --rm -v "$(pwd):/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --json > trufflehog-results.json
        continue-on-error: true

      - name: Upload TruffleHog Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results-${{ github.run_number }}
          path: trufflehog-results.json


  # 3. DAST - Version avec Docker direct (sans l'action problématique)
  dast-scan:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready!"
              break
            fi
            echo "Attempt $i/30: Juice Shop not ready yet, waiting..."
            sleep 5
          done
          
      - name: Verify Juice Shop is running
        run: |
          if ! curl -s http://localhost:3000 > /dev/null; then
            echo "Error: Juice Shop failed to start"
            docker logs juice-shop
            exit 1
          fi

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            -v $(pwd):/zap/wrk \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -z "-config replacer.full_list\(0\).description=auth \
                -config replacer.full_list\(0\).enabled=true \
                -config replacer.full_list\(0\).matchtype=REQ_HEADER \
                -config replacer.full_list\(0\).matchstr=Cookie \
                -config replacer.full_list\(0\).regex=false \
                -config replacer.full_list\(0\).replacement=''"
        continue-on-error: true

      - name: List generated files
        if: always()
        run: |
          echo "=== Generated files ==="
          ls -lah
          echo "======================"
          
      - name: Display report summary
        if: always()
        run: |
          if [ -f report_md.md ]; then
            echo "=== ZAP Report Summary ==="
            head -50 report_md.md
            echo "=========================="
          fi

      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            report_html.html
            report_md.md
            report_json.json

      - name: Stop and remove Juice Shop
        if: always()
        run: |
          docker stop juice-shop
          docker rm juice-shop
