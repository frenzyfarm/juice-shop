name: CI/CD Security Pipeline (Juice Shop - Fixed)

on:
  push:
  pull_request:

jobs:

  # 1. SAST - Analyse statique
  sast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -r . -f html -o bandit-report.html
        continue-on-error: true

      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_number }}
          path: bandit-report.html


  # 2. Secrets Scan - Version qui détecte TOUS les secrets (sans filtrage)
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog with entropy detection (catch all secrets)
        run: |
          # Version qui détecte les secrets avec entropie et sans vérification
          # pour capturer TOUS les secrets potentiels
          docker run --rm -v "$(pwd):/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --json \
            --entropy \
            --no-verification \
            > trufflehog-results.json
          
          # Afficher un résumé des résultats
          echo "=== TruffleHog Scan Summary ==="
          if [ -s trufflehog-results.json ]; then
            echo "✅ Secrets found! Total findings: $(wc -l < trufflehog-results.json)"
            echo ""
            echo "Files with potential secrets:"
            cat trufflehog-results.json | grep -o '"path":"[^"]*"' | sort | uniq -c
          else
            echo "⚠️ No secrets detected by TruffleHog"
            echo "Creating a placeholder file for artifact..."
            echo '{"message": "No secrets found with entropy detection"}' > trufflehog-results.json
          fi
        continue-on-error: true

      - name: Display sample of detected secrets (for debugging)
        if: always()
        run: |
          if [ -s trufflehog-results.json ] && [ "$(wc -l < trufflehog-results.json)" -gt 0 ]; then
            echo "=== First 3 detected secrets (preview) ==="
            head -3 trufflehog-results.json | jq -r '"Detector: \(.DetectorName) | File: \(.SourceMetadata.Data.filesystem.path) | Value: \(.Raw[0:50])"' 2>/dev/null || head -3 trufflehog-results.json
          fi

      - name: Upload TruffleHog Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results-${{ github.run_number }}
          path: trufflehog-results.json


  # 3. DAST - Version avec succès forcé même en cas de warnings
  dast-scan:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan]
    # 🔥 Important: Force le succès du job même si ZAP retourne des warnings
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory with proper permissions
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
          
      - name: Start Juice Shop with host network
        run: |
          docker run -d \
            --name juice-shop \
            --network host \
            bkimminich/juice-shop
            
      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready!"
              break
            fi
            echo "Attempt $i/30: Juice Shop not ready yet, waiting..."
            sleep 5
          done
          
      - name: Verify Juice Shop is running
        run: |
          if ! curl -s http://localhost:3000 > /dev/null; then
            echo "Error: Juice Shop failed to start"
            docker logs juice-shop
            exit 1
          fi
          
      - name: Run ZAP Baseline Scan
        id: zap_scan
        run: |
          # Exécuter ZAP et capturer le code de sortie
          docker run --rm \
            --user root \
            --network host \
            -v $(pwd)/zap-reports:/zap/wrk \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html || true
          
          # ZAP retourne :
          # 0 = succès (pas de problèmes)
          # 1 = erreur d'exécution
          # 2 = warnings trouvés
          # 3 = erreur technique
          
          echo "ZAP scan completed (warnings are acceptable)"
          
      - name: List generated files
        if: always()
        run: |
          echo "=== Generated files ==="
          ls -lah zap-reports/
          echo "======================"
          
      - name: Display report summary
        if: always()
        run: |
          if [ -f zap-reports/report_md.md ]; then
            echo "=== ZAP Report Summary ==="
            head -50 zap-reports/report_md.md
            echo "=========================="
          fi
          
      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            zap-reports/report_html.html
            zap-reports/report_md.md
            zap-reports/report_json.json
            
      - name: Stop and remove Juice Shop
        if: always()
        run: |
          docker stop juice-shop
          docker rm juice-shop
