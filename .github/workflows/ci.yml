name: CI/CD Security Pipeline (Juice Shop - Fixed)

on:
  push:
  pull_request:

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Scan
        run: bandit -r . -f html -o bandit-report.html
        continue-on-error: true
      - name: Upload Bandit Artifact
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report-${{ github.run_number }}
          path: bandit-report.html

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog Scan
        run: |
          docker run --rm -v "$(pwd):/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --json \
            --no-verification \
            --no-update \
            > trufflehog-results.json
        continue-on-error: true
      - name: Upload TruffleHog Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trufflehog-results-${{ github.run_number }}
          path: trufflehog-results.json

  dast-scan:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create reports directory
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
      - name: Start Juice Shop
        run: |
          docker run -d \
            --name juice-shop \
            --network host \
            bkimminich/juice-shop
      - name: Wait for Juice Shop
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              break
            fi
            sleep 5
          done
      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            --user root \
            --network host \
            -v $(pwd)/zap-reports:/zap/wrk \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html || true
      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            zap-reports/report_html.html
            zap-reports/report_md.md
            zap-reports/report_json.json
      - name: Stop Juice Shop
        if: always()
        run: |
          docker stop juice-shop
          docker rm juice-shop
